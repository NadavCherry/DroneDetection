<text x="270.0" y="390" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff" letter-spacing="0.8">MEASURED &#183; RTX 5070, 591-FRAME TEST VIDEO</text>
<text x="58" y="436" font-size="13.5" fill="#e6edf3" opacity="0.9" font-weight="400">stabilize + warp</text>
<text x="482" y="436" text-anchor="end" font-size="13.5" font-weight="400" fill="#e6edf3">4.3 ms</text>
<text x="58" y="462" font-size="13.5" fill="#e6edf3" opacity="0.9" font-weight="400">nano net (TensorRT FP16)</text>
<text x="482" y="462" text-anchor="end" font-size="13.5" font-weight="400" fill="#e6edf3">6.7 ms</text>
<text x="58" y="488" font-size="13.5" fill="#e6edf3" opacity="0.9" font-weight="400">Kalman tracker</text>
<text x="482" y="488" text-anchor="end" font-size="13.5" font-weight="400" fill="#e6edf3">0.1 ms</text>
<text x="58" y="514" font-size="13.5" fill="#e6edf3" opacity="0.9" font-weight="700">end-to-end</text>
<text x="482" y="514" text-anchor="end" font-size="13.5" font-weight="700" fill="#e6edf3">11 ms &#183; 74 fps</text>
<text x="270.0" y="581" text-anchor="middle" font-size="12.5" fill="#9198a1">projected on Jetson Orin Nano: 10-15 fps @1280, 25-35 fps @640</text>
