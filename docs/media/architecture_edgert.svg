<text x="1200.0" y="138" text-anchor="middle" font-size="16.5" font-weight="700" fill="#e6edf3">yolov8n-P2 @ 1280 &#8212; TensorRT FP16</text>
<text x="1200.0" y="168" text-anchor="middle" font-size="14" fill="#e6edf3" opacity="0.9">reads the whole stack, full frame</text>
<text x="1200.0" y="192" text-anchor="middle" font-size="14" fill="#e6edf3" opacity="0.9">no proposals &#183; no crops &#183; no expert</text>
<text x="1200.0" y="216" text-anchor="middle" font-size="14" fill="#e6edf3" opacity="0.9">&#8250; drone / bird, everywhere</text>
<text x="1200.0" y="281" text-anchor="middle" font-size="12.5" fill="#9198a1">6.7 ms/frame &#8212; the entire neural budget</text>
