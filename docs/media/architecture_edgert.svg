<text x="400.0" y="136" text-anchor="middle" font-size="16.5" font-weight="700" fill="#e6edf3">stabilize (CPU)</text>
<text x="400.0" y="160" text-anchor="middle" font-size="13.5" fill="#e6edf3" opacity="0.87">phase-correlate a fixed</text>
<text x="400.0" y="180" text-anchor="middle" font-size="13.5" fill="#e6edf3" opacity="0.87">768&#215;448 central crop</text>
<text x="400.0" y="200" text-anchor="middle" font-size="13.5" fill="#e6edf3" opacity="0.87">against frame 0</text>
<text x="400.0" y="271" text-anchor="middle" font-size="12.5" fill="#9198a1">full-frame precision at 1/3 the cost &#183; 4.3 ms</text>
