<text x="815" y="140" text-anchor="middle" font-size="15.5" font-weight="700" fill="#e6edf3">three moments,</text>
<text x="815" y="162" text-anchor="middle" font-size="15.5" font-weight="700" fill="#e6edf3">one image</text>
<text x="742" y="205" font-size="14.5" font-weight="700" fill="#e3b341">t-12</text>
<text x="782" y="205" font-size="14.5" font-weight="700" fill="#db61a2">t-6</text>
<text x="815" y="205" font-size="14.5" font-weight="700" fill="#39c5cf">now</text>
<text x="857" y="205" font-size="13.5" fill="#e6edf3" opacity="0.85">= channels</text>
<text x="765.0" y="235" text-anchor="middle" font-size="13.5" fill="#e6edf3" opacity="0.87">stabilized grays from a 13-frame ring buffer</text>
<text x="765.0" y="281" text-anchor="middle" font-size="12.5" fill="#9198a1">static world cancels to gray &#8212; movers leave a colored trail</text>
