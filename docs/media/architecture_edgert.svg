<text x="780.0" y="456" text-anchor="middle" font-size="13.5" fill="#e6edf3" opacity="0.87">Kalman tracker, camera-</text>
<text x="780.0" y="476" text-anchor="middle" font-size="13.5" fill="#e6edf3" opacity="0.87">compensated; coasting +</text>
<text x="780.0" y="496" text-anchor="middle" font-size="13.5" fill="#e6edf3" opacity="0.87">strict local re-acquisition</text>
<text x="780.0" y="561" text-anchor="middle" font-size="12.5" fill="#9198a1">same tracker as PC-MAX &#183; 0.1 ms</text>
