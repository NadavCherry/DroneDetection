<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="800" viewBox="0 0 1840 800" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<rect width="1840" height="800" fill="#0d1117" rx="12"/>
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5"
