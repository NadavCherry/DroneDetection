<text x="920.0" y="784" text-anchor="middle" font-size="13" fill="#9198a1">unseen test video: tracked AP / F1 / R / P = 1.000, zero false alarms &#183; ~4 fps on an RTX 5070 laptop &#8212; the accuracy-first profile</text>
